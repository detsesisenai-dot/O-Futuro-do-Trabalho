                        <section className="mb-20 animate-fade-in">
                            <div className="text-center max-w-3xl mx-auto mb-12">
                                <h3 className="font-serif text-3xl md:text-5xl font-bold mb-6 tracking-tight text-brandDark">O Catálogo de Novas Profissões</h3>
                                <p className="text-xs font-bold uppercase tracking-widest text-brandOrange mb-6 border-b border-gray-200 pb-2 inline-block">Perspectiva: The Futura Lab</p>
                                
                                <p className="text-lg text-gray-800 font-medium leading-relaxed">
                                    Onde as novas competências éticas (Delphi) e o gerenciamento de dados complexos (MIT) se encontram? No catálogo das novas profissões. A automação oblitera o trabalho mecânico, mas faz nascer uma hiperespecialização nas fronteiras da biologia, clima e dados.
                                </p>
                            </div>

                            {/* Interactive Filter */}
                            <div className="flex flex-wrap justify-center gap-3 mb-10">
                                {Object.keys(jobCategories).map((cat) => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveCategory(cat)}
                                        className={`px-5 py-2 text-xs font-bold tracking-widest uppercase transition-all duration-300 ${activeCategory === cat ? 'bg-brandDark text-white shadow-md' : 'bg-white text-gray-800 border border-gray-400 hover:border-brandDark hover:bg-gray-100 shadow-sm'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>

                            {/* Dynamic Job Cards with Photos */}
                            <div className="grid md:grid-cols-3 gap-8">
                                {jobCategories[activeCategory].map((job, idx) => (
                                    <div key={idx} className="bg-white border border-gray-200 flex flex-col h-full editorial-card overflow-hidden group shadow-md">
                                        <div className="relative aspect-[4/3] w-full overflow-hidden bg-gray-200">
                                            <img src={job.img} alt={job.title} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy"/>
                                            <div className="absolute top-0 left-0 bg-brandOrange text-white text-xs font-bold px-3 py-1 uppercase tracking-widest m-4 shadow">
                                                0{idx + 1}
                                            </div>
                                        </div>
                                        <div className="p-6 flex flex-col flex-grow bg-white">
                                            <h4 className="font-serif font-bold text-xl text-brandDark mb-3 leading-snug">{job.title}</h4>
                                            <p className="text-gray-800 text-sm font-sans leading-relaxed mt-auto font-medium">{job.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <SectionDivider />

                        {/* Section 5: A Nova Porta de Entrada (SSIR) */}
                        <section className="mb-20 animate-fade-in">
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-10 items-center">
                                <div className="md:col-span-6">
                                    <h3 className="font-serif text-3xl md:text-5xl font-bold mb-6 tracking-tight text-brandDark">O Colapso do Diploma</h3>
                                    <p className="text-xs font-bold uppercase tracking-widest text-brandOrange mb-8 border-b border-gray-200 pb-2 inline-block">A Solução Sistêmica (SSIR)</p>
                                    
                                    <DidacticIntro 
                                        text="Como conectar a força de trabalho atual, paralisada pela incerteza (CNI), com um catálogo de profissões altamente sofisticadas (Futura Lab)? A resposta exige implodir o modelo educacional vigente."
                                    />
                                    
                                    <p className="text-gray-800 font-sans leading-relaxed mb-6 font-medium">
                                        O artigo da *Stanford Social Innovation Review* alerta: usar diplomas universitários como única "porta de entrada" gerou um gargalo ineficiente. Empregadores na vanguarda não buscam mais papéis carimbados; eles caçam <strong>expertise latente</strong> — habilidades práticas e adjacentes que o trabalhador possui, mas não são certificadas de forma tradicional.
                                    </p>
                                    
                                    <CorrelationBlock 
                                        sources="SSIR x Delphi"
                                        title="A Morte da Hard Skill Formal"
                                        text="Enquanto a academia prevê que habilidades puramente técnicas serão corroídas pela IA, a exigência de mercado corrobora essa visão: habilidades comportamentais e cognitivas serão as novas chaves de entrada."
                                    />
                                </div>
                                
                                <div className="md:col-span-6 space-y-4">
                                    <h4 className="font-serif text-2xl font-bold mb-6 text-brandDark">Novos Princípios de Contratação</h4>
                                    
                                    <div className="bg-brandDark text-white p-6 border-l-4 border-brandCyan">
                                        <span className="text-brandCyan font-bold text-lg block mb-1">01. Expertise Latente</span>
                                        <p className="text-sm text-gray-300 font-light">Valorização de experiências vividas, resolução de problemas no dia a dia e resiliência, substituindo graduações formais.</p>
                                    </div>
                                    <div className="bg-brandDark text-white p-6 border-l-4 border-brandOrange">
                                        <span className="text-brandOrange font-bold text-lg block mb-1">02. Foco na Prática</span>
                                        <p className="text-sm text-gray-300 font-light">Aprendizagem baseada no trabalho torna-se o modelo padrão, servindo de escada rápida e validada para vagas abertas.</p>
                                    </div>
                                    <div className="bg-brandDark text-white p-6 border-l-4 border-brandCyan">
                                        <span className="text-brandCyan font-bold text-lg block mb-1">03. Contratação por Habilidades</span>
                                        <p className="text-sm text-gray-300 font-light">Abandono de filtros por diploma. Avaliação baseada no desempenho, abrindo espaço para talentos de origens não-tradicionais.</p>
                                    </div>
                                    <div className="bg-brandDark text-white p-6 border-l-4 border-brandOrange">
                                        <span className="text-brandOrange font-bold text-lg block mb-1">04. Credenciais Portáteis</span>
                                        <p className="text-sm text-gray-300 font-light">Sistemas interoperáveis legíveis por IA onde o indivíduo carrega seu "histórico de habilidades" validado de forma imutável.</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Interactive Acervo Section (Rodapé Editorial) */}
                        <section className="mt-24 pt-16 border-t border-gray-300 relative">
                            <div className="text-center mb-16">
                                <h3 className="text-3xl font-serif font-bold text-brandDark mb-4">Acervo Digital & Síntese</h3>
                                <p className="text-gray-500 font-serif italic max-w-2xl mx-auto text-sm">
                                    Clique nos dossiês abaixo para revelar os insights originais e as recomendações estratégicas consolidadas de cada fonte.
                                </p>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 md:gap-6 mb-12 relative z-20">
                                {reportsData.map((report) => (
                                    <div 
                                        key={report.id} 
                                        onClick={() => setActiveReport(activeReport === report.id ? null : report.id)}
                                        className={`cursor-pointer transform transition-all duration-500 hover:-translate-y-4 relative ${activeReport === report.id ? 'scale-105 z-30 shadow-2xl ring-2 ring-brandDark ring-offset-4' : 'scale-100 shadow-md'}`}
                                    >
                                        {/* "Capa de Relatório" CSS */}
                                        <div className={`aspect-[3/4] overflow-hidden relative flex flex-col p-4 md:p-5 ${report.theme}`}>
                                            <div className="book-spine"></div>
                                            <div className="relative z-10 flex-grow flex flex-col justify-between">
                                                <div>
                                                    <p className="text-[0.55rem] md:text-[0.65rem] uppercase tracking-widest opacity-80 mb-3 border-b border-white/20 pb-2">{report.author}</p>
                                                    <h4 className="font-serif font-bold leading-snug text-sm md:text-lg">{report.title}</h4>
                                                </div>
                                                <div className="self-end mt-4">
                                                    <div className="w-8 h-8 rounded-full border border-white/30 flex items-center justify-center bg-white/5 backdrop-blur-sm">
                                                        <span className="text-xs">+</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Detalhe do Relatório Selecionado (Painel Expansivo) */}
                            {activeReport && (
                                <div className="bg-white border-y border-brandDark shadow-2xl p-8 md:p-12 animate-fade-in relative z-10 mt-8 mb-16 overflow-hidden">
                                    <button 
                                        onClick={() => setActiveReport(null)}
                                        className="absolute top-6 right-6 text-gray-400 hover:text-brandOrange uppercase text-xs tracking-widest font-bold transition-colors z-20"
                                    >
                                        [ Fechar Painel ]
                                    </button>
                                    
                                    {reportsData.map((report) => report.id === activeReport && (
                                        <div key={`detail-${report.id}`} className="grid md:grid-cols-2 gap-12 relative">
                                            <div className="flex flex-col justify-center">
                                                <span className="text-xs font-bold uppercase tracking-widest text-brandCyan mb-2">{report.author}</span>
                                                <h4 className="text-3xl md:text-4xl font-serif font-bold text-brandDark mb-8 leading-tight">{report.title}</h4>
                                                
                                                <h5 className="font-bold text-brandDark uppercase tracking-widest text-xs mb-3 border-b border-gray-200 pb-2">Síntese Documental</h5>
                                                <p className="text-gray-600 font-sans leading-relaxed mb-8 md:mb-0">{report.synthesis}</p>
                                            </div>
                                            
                                            <div className="bg-brandLight p-8 border-l-4 border-brandOrange h-full flex flex-col justify-center">
                                                <h5 className="font-bold text-brandOrange uppercase tracking-widest text-xs mb-4 flex items-center">
                                                    Insight Estratégico (Foresight)
                                                </h5>
                                                <p className="text-gray-800 leading-relaxed font-serif text-lg md:text-xl italic">"{report.insight}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>

                    </main>

                    {/* Footer Clean Editorial */}
                    <footer className="bg-brandDark text-gray-200 py-16 px-6 text-center border-t border-gray-700 shadow-inner">
                        <div className="max-w-4xl mx-auto">
                            <h5 className="text-white font-serif font-bold text-xl mb-6">Referências Bibliográficas</h5>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-sans text-left text-gray-300 mb-12">
                                <p><strong className="text-white">CNI (2026):</strong> Retratos da Sociedade Brasileira - CNI: Futuro Profissional.</p>
                                <p><strong className="text-white">Estudo Delphi (2026):</strong> Fundamentos para o Futuro - Mudanças nas Competências na Era da IA.</p>
                                <p><strong className="text-white">MIT Tech Review & Snowflake (2025):</strong> Redefinindo a Engenharia de Dados na Era da IA.</p>
                                <p><strong className="text-white">The Futura Lab:</strong> 100 Profissões do Futuro (Martha Gabriel).</p>
                                <p><strong className="text-white">SSIR Brasil (2025):</strong> Uma nova porta de entrada no mercado de trabalho na era da IA.</p>
                            </div>
                            
                            <div className="pt-8 border-t border-gray-700 text-xs uppercase tracking-widest flex flex-col md:flex-row justify-center items-center gap-4 text-gray-400">
                                <span className="text-gray-200">Design de Futuros</span>
                                <span className="hidden md:inline text-brandOrange font-bold">•</span>
                                <span className="text-gray-200">Reportagem Visual</span>
                                <span className="hidden md:inline text-brandCyan font-bold">•</span>
                                <span className="text-gray-200">React SPA</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
