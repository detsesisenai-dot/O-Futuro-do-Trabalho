                                                <span className="flex-shrink-0 w-8 h-8 rounded-sm bg-brandCyanDark text-white flex items-center justify-center font-bold font-serif">2</span>
                                                <p className="text-sm text-gray-200 leading-relaxed"><strong className="text-white block mb-1">Cursos Técnicos "Hands-on":</strong> A Neoindustrialização não exige apenas bacharéis, mas um exército técnico. Priorizar formações imersivas, práticas e de curtíssimo prazo direcionadas diretamente para operar as Novas Profissões (ex: técnicos em robótica, operadores de IoT e IA).</p>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <SectionDivider />

                        {/* Section 5: O Fim do Dilema do Diploma (SSIR) */}
                        <section className="mb-20 animate-fade-in">
                            <div className="bg-brandLight border-2 border-brandDark p-8 md:p-12 shadow-lg relative">
                                <div className="flex items-center space-x-4 mb-6">
                                    <div className="p-3 bg-brandDark text-white rounded-sm">
                                        <IconUser />
                                    </div>
                                    <div>
                                        <h3 className="text-3xl md:text-4xl font-serif font-bold text-brandDark tracking-tight">O Fim do Dilema do Diploma</h3>
                                        <p className="text-gray-500 uppercase tracking-widest text-xs font-bold mt-2">Fonte: Stanford Social Innovation Review (SSIR)</p>
                                    </div>
                                </div>
                                
                                <DidacticIntro 
                                    text="A solução sistêmica para a incerteza do trabalhador (CNI) e a complexidade técnica exigida pelo mercado (MIT) reside em uma mudança fundamental: a porta de entrada."
                                />

                                <div className="grid md:grid-cols-2 gap-10 mt-8">
                                    <div>
                                        <p className="text-gray-800 text-lg leading-relaxed font-medium mb-6">
                                            A dependência histórica de diplomas acadêmicos tradicionais criou um gargalo artificial na economia moderna. O mercado ágil da IA exige <strong className="text-brandOrange">"expertise latente"</strong> — habilidades práticas e adaptabilidade que o trabalhador vive, mas que o pedágio do diploma de 4 anos não certifica a tempo.
                                        </p>
                                        <div className="bg-brandDark p-6 text-white border-l-4 border-brandOrange">
                                            <h4 className="font-bold uppercase tracking-widest text-xs mb-2 text-brandCyan">A Transição Necessária</h4>
                                            <p className="font-serif italic text-lg">A contratação baseada em habilidades (skills-based hiring) apoiada por microcredenciais é a única saída para unir a mão de obra paralisada às profissões de fronteira.</p>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div className="p-4 border border-gray-300 bg-white shadow-sm flex items-start gap-4">
                                            <span className="text-brandCyan font-bold text-xl">01</span>
                                            <p className="text-sm text-gray-700"><strong>Desconstrução do Cargo:</strong> Focar em tarefas (tasks) e nas competências reais necessárias para executá-las, não em títulos universitários.</p>
                                        </div>
                                        <div className="p-4 border border-gray-300 bg-white shadow-sm flex items-start gap-4">
                                            <span className="text-brandOrange font-bold text-xl">02</span>
                                            <p className="text-sm text-gray-700"><strong>Microcredenciais Dinâmicas:</strong> Certificações curtas e constantes (bootcamps, cursos corporativos) que atestam a expertise latente do indivíduo.</p>
                                        </div>
                                        <div className="p-4 border border-gray-300 bg-white shadow-sm flex items-start gap-4">
                                            <span className="text-brandDark font-bold text-xl">03</span>
                                            <p className="text-sm text-gray-700"><strong>Contratação por Habilidades:</strong> Avaliar o portfólio prático e a capacidade de resolução de problemas (Competência Metodológica) acima da formação clássica.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <SectionDivider />

                        {/* Section 6: O Catálogo de Novas Profissões (Futura Lab) */}
                        <section className="mb-20 animate-fade-in">
                            <div className="flex items-center space-x-4 mb-8">
                                <div className="p-3 bg-brandDark text-white rounded-sm">
                                    <IconGlobe />
                                </div>
                                <div>
                                    <h3 className="text-4xl font-serif font-bold text-brandDark tracking-tight">O Catálogo Completo: 100 Profissões do Futuro</h3>
                                    <p className="text-gray-500 uppercase tracking-widest text-xs font-bold mt-2">Íntegra do Mapeamento • The Futura Lab (Martha Gabriel)</p>
                                </div>
                            </div>
                            
                            <div className="max-w-4xl mb-12">
                                <DidacticIntro 
                                    text="A automação não dizima o trabalho; ela o hiper-especializa. O mapeamento integral abaixo revela TODAS as 100 carreiras emergentes, categorizadas em 10 blocos de fronteira. Estas são as ocupações exatas que exigirão as microcertificações (SSIR) e a agilidade metodológica (Delphi) para as quais precisamos urgentemente preparar a base produtiva e educacional (CNI)."
                                />
                            </div>

                            {/* Menu de Categorias (Abas Horizontais com Scroll) */}
                            <div className="flex overflow-x-auto pb-4 mb-10 gap-3 scrollbar-hide snap-x" style={{scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
                                {Object.keys(jobCategories).map((cat) => (
                                    <button 
                                        key={cat}
                                        onClick={() => setActiveCategory(cat)}
                                        className={`flex-shrink-0 snap-start px-6 py-3 text-xs md:text-sm font-bold tracking-widest uppercase transition-all duration-300 rounded-sm border ${
                                            activeCategory === cat 
                                            ? 'bg-brandDark text-white border-brandDark shadow-lg' 
                                            : 'bg-white text-gray-600 border-gray-300 hover:border-brandOrange hover:text-brandOrange shadow-sm'
                                        }`}
                                    >
                                        {cat} <span className={`ml-1 opacity-70 text-[0.65rem] ${activeCategory === cat ? 'text-brandOrange' : ''}`}>(10)</span>
                                    </button>
                                ))}
                            </div>

                            {/* Painel da Categoria Ativa */}
                            <div className="bg-white border border-gray-200 shadow-xl rounded-sm overflow-hidden animate-fade-in">
                                
                                {/* Banner Visual & Insight Estratégico do Bloco */}
                                <div className="grid md:grid-cols-5 bg-brandDark">
                                    <div className="md:col-span-2 relative aspect-video md:aspect-auto h-48 md:h-full">
                                        <img src={jobCategories[activeCategory].img} alt={activeCategory} className="absolute inset-0 w-full h-full object-cover opacity-80 mix-blend-screen" loading="lazy" />
                                        <div className="absolute inset-0 bg-gradient-to-r from-brandDark/80 to-transparent"></div>
                                        <div className="absolute bottom-6 left-6">
                                            <h4 className="font-serif font-bold text-3xl text-white">{activeCategory}</h4>
                                        </div>
                                    </div>
                                    <div className="md:col-span-3 p-8 md:p-10 flex flex-col justify-center border-l-4 border-brandOrange">
                                        <span className="text-xs uppercase tracking-widest text-brandOrange font-bold mb-3 block">Foresight Estratégico (Cross-Reference)</span>
                                        <p className="text-gray-200 font-serif italic text-lg leading-relaxed">
                                            "{jobCategories[activeCategory].insight}"
                                        </p>
                                    </div>
                                </div>

                                {/* Lista das 10 Profissões (Grid Interno) */}
                                <div className="p-8 md:p-12">
                                    <div className="grid md:grid-cols-2 gap-x-12 gap-y-8">
                                        {jobCategories[activeCategory].jobs.map((job, idx) => {
                                            // Calculando o índice global contínuo (001 a 100) baseado na categoria atual
                                            const categoryKeys = Object.keys(jobCategories);
                                            const categoryIndex = categoryKeys.indexOf(activeCategory);
                                            const globalIndex = (categoryIndex * 10) + idx + 1;

                                            return (
                                                <div key={idx} className="flex gap-4 group">
                                                    <div className="flex-shrink-0 font-serif text-3xl font-black text-gray-200 group-hover:text-brandCyan transition-colors">
                                                        {globalIndex.toString().padStart(3, '0')}
                                                    </div>
                                                    <div>
                                                        <h5 className="font-bold text-brandDark text-lg mb-1 leading-tight group-hover:text-brandOrange transition-colors">{job.title}</h5>
                                                        <p className="text-gray-600 text-sm leading-relaxed">{job.desc}</p>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Interactive Acervo Section (Rodapé Editorial) */}
                        <section className="mt-28 pt-16 border-t border-gray-300 relative z-0">
                            <div className="text-center mb-16">
                                <h3 className="text-3xl md:text-4xl font-serif font-bold text-brandDark mb-4">Acervo Digital & Síntese</h3>
                                <p className="text-gray-600 font-serif italic max-w-2xl mx-auto text-base">
                                    Clique nos dossiês abaixo para revelar as sínteses executivas e os insights originais de cada publicação citada nesta reportagem.
                                </p>
                            </div>

                            <div className="grid grid-cols-2 md:grid-cols-5 gap-4 md:gap-6 mb-12 relative z-20">
                                {reportsData.map((report) => (
                                    <div 
                                        key={report.id} 
                                        onClick={() => setActiveReport(activeReport === report.id ? null : report.id)}
                                        className={`cursor-pointer transform transition-all duration-500 hover:-translate-y-4 relative ${activeReport === report.id ? 'scale-105 z-30 shadow-2xl ring-4 ring-brandOrange ring-offset-4' : 'scale-100 shadow-md'}`}
                                    >
                                        <div className={`aspect-[3/4] overflow-hidden relative flex flex-col p-4 md:p-5 ${report.theme}`}>
                                            <div className="book-spine"></div>
                                            <div className="relative z-10 flex-grow flex flex-col justify-between">
                                                <div>
                                                    <p className="text-[0.55rem] md:text-[0.65rem] uppercase tracking-widest opacity-80 mb-3 border-b border-white/20 pb-2">{report.author}</p>
                                                    <h4 className="font-serif font-bold leading-snug text-sm md:text-lg">{report.title}</h4>
                                                </div>
                                                <div className="self-end mt-4">
                                                    <div className={`w-8 h-8 rounded-full border border-white/30 flex items-center justify-center bg-white/5 backdrop-blur-sm transition-transform ${activeReport === report.id ? 'rotate-45' : ''}`}>
                                                        <span className="text-xs font-bold">+</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {activeReport && (
                                <div className="bg-white border-y-4 border-brandOrange shadow-2xl p-8 md:p-14 animate-fade-in relative z-10 mt-8 mb-16 overflow-hidden">
                                    <button 
                                        onClick={() => setActiveReport(null)}
                                        className="absolute top-6 right-6 text-gray-400 hover:text-brandDark uppercase text-xs tracking-widest font-bold transition-colors z-20"
                                    >
                                        [ Fechar Painel ]
                                    </button>
                                    
                                    {reportsData.map((report) => report.id === activeReport && (
                                        <div key={`detail-${report.id}`} className="grid md:grid-cols-2 gap-12 relative">
                                            <div className="flex flex-col justify-center">
                                                <span className="text-xs font-bold uppercase tracking-widest text-brandCyanDark mb-2">{report.author}</span>
                                                <h4 className="text-3xl md:text-4xl font-serif font-bold text-brandDark mb-8 leading-tight">{report.title}</h4>
                                                
                                                <h5 className="font-bold text-brandDark uppercase tracking-widest text-xs mb-3 border-b border-gray-200 pb-2">Síntese Documental</h5>
                                                <p className="text-gray-800 font-sans leading-relaxed text-lg mb-8 md:mb-0 font-medium">{report.synthesis}</p>
                                            </div>
                                            
                                            <div className="bg-gray-50 p-8 md:p-10 border-l-4 border-brandOrange h-full flex flex-col justify-center shadow-inner">
                                                <h5 className="font-bold text-brandOrange uppercase tracking-widest text-xs mb-5 flex items-center">
                                                    Insight Estratégico (Foresight)
                                                </h5>
                                                <p className="text-gray-800 leading-relaxed font-serif text-xl md:text-2xl italic font-bold">"{report.insight}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </section>

                    </main>

                    {/* Footer Clean Editorial */}
                    <footer className="bg-brandDark text-gray-200 py-16 px-6 text-center border-t border-gray-800 shadow-inner mt-10">
                        <div className="max-w-4xl mx-auto">
                            <h5 className="text-white font-serif font-bold text-2xl mb-8">Referências Bibliográficas</h5>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-xs font-sans text-left text-gray-400 mb-12">
                                <p><strong className="text-white">CNI (2026):</strong> Retratos da Sociedade Brasileira: Futuro Profissional.</p>
                                <p><strong className="text-white">Estudo Delphi (2026):</strong> Fundamentos para o Futuro - Mudanças nas Competências na Era da IA. (Schoëttl, Zeller-Lanzl, Gimpel).</p>
                                <p><strong className="text-white">MIT Tech Review & Snowflake (2025):</strong> Redefinindo a Engenharia de Dados na Era da IA. (Denis McCauley).</p>
                                <p><strong className="text-white">The Futura Lab:</strong> 100 Profissões do Futuro. (Martha Gabriel).</p>
                                <p><strong className="text-white">SSIR Brasil (2025):</strong> Uma nova porta de entrada no mercado de trabalho na era da IA.</p>
                            </div>
                            
                            <div className="pt-10 border-t border-gray-800 text-xs uppercase tracking-widest flex flex-col md:flex-row justify-center items-center gap-6 text-gray-500 font-bold">
                                <span className="hover:text-white transition-colors">Design de Futuros</span>
                                <span className="hidden md:inline text-brandOrange">•</span>
                                <span className="hover:text-white transition-colors">Reportagem Visual</span>
                                <span className="hidden md:inline text-brandCyanDark">•</span>
                                <span className="hover:text-white transition-colors">React SPA</span>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
